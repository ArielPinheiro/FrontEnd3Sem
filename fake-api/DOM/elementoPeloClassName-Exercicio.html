<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegar elemento pela class</title>

    <style>
        .corsim {
            color: green;
        }

        .cornao {
            color: red;
        }
    </style>

</head>

<body>

    <input type="text" id="fruta" placeholder="Digite o nome da fruta">

    <select name="" id="nomeClasse">
        <option value="">Selecione</option>
        <option value="corsim">Corsim</option>
        <option value="cornao">Cornao</option>
    </select>

    <button onclick="CadastrarFruta()">Cadastrar Fruta</button>

    <ul id="listarFrutas">
        <li class="corsim">Amora</li>
    </ul>

    <script>
        function CadastrarFruta() {
            const fruta = document.getElementById("fruta").value;
            const listaFrutas = document.getElementById("listarFrutas");
            const nomeClasse = document.getElementById("nomeClasse").value;

            if (fruta.trim().length == 0 || nomeClasse.length == 0) {
                alert("Preencha os campos corretamente");
                return false;
            }

            listaFrutas.innerHTML += `<li class="${nomeClasse}">${fruta}</li>`;
        }
    </script>

</body>

</html>
